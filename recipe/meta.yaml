{% set name = "opentelemetry-distro" %}
{% set version = "0.62b1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/opentelemetry_distro-{{ version }}.tar.gz
  sha256: 0169b128b9d6d5cab809ae4c4fb3d576bfc5d3f30b32d8a43b770b587f04f253

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - opentelemetry-api ~=1.12
    - opentelemetry-instrumentation ==0.62b1
    - opentelemetry-sdk ~=1.13
    # - opentelemetry-exporter-otlp ==1.30.0
    # - opentelemetry-exporter-otlp ==1.31.0
    # - opentelemetry-exporter-otlp ==1.31.1
    # - opentelemetry-exporter-otlp ==1.32.0
    # - opentelemetry-exporter-otlp ==1.32.1
    # - opentelemetry-exporter-otlp ==1.33.0
    # - opentelemetry-exporter-otlp ==1.33.1
    # - opentelemetry-exporter-otlp ==1.34.0
    # - opentelemetry-exporter-otlp ==1.34.1
    # - opentelemetry-exporter-otlp ==1.35.0
    # - opentelemetry-exporter-otlp ==1.36.0
    # - opentelemetry-exporter-otlp ==1.37.0
    # - opentelemetry-exporter-otlp ==1.38.0
    # - opentelemetry-exporter-otlp ==1.39.0
    # - opentelemetry-exporter-otlp ==1.39.1
    # - opentelemetry-exporter-otlp ==1.40.0
    # - opentelemetry-exporter-otlp ==1.41.0
    # - opentelemetry-exporter-otlp ==1.41.1

test:
  imports:
    - opentelemetry.distro
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://pypi.org/project/opentelemetry-distro/
  summary: OpenTelemetry Python Distro
  license: 'Apache-2.0'
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
    - goatmale
